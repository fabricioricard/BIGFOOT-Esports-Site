<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - BIGFOOT Esports</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <div class="logo">
            <img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/logo.svg" alt="Logo BIGFOOT Esports" class="logo-svg">
            <span>BIGFOOT Esports</span>
        </div>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="eventos.html">📅 Eventos</a></li>
                <li><a href="loja.html">🛒 Loja</a></li>
                <li><a href="equipe.html">👥 Equipe</a></li>
                <li><a href="contato.html">📧 Contato</a></li>
            </ul>
            <div class="login-bar">
                <button id="login-btn">Login</button>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <button>🔍</button>
            </div>
        </nav>
    </header>

    <!-- Modal de Login -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">×</span>
            <h2>Login</h2>
            <form id="login-form">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Usuário" required>
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Seção de Contato -->
    <section id="contato" class="contact-section reveal">
        <h2>Entre em Contato</h2>
        <p>Entre em contato com o BIGFOOT Esports! Estamos sempre prontos para ouvir você e responder suas perguntas sobre nossa comunidade.</p>
        <div class="contact-content">
            <div class="contact-image">
                <img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/foto1.jpg" alt="Contato" class="hover-zoom">
            </div>
            <form>
                <label for="nome-contato">Nome</label>
                <input type="text" id="nome-contato" name="nome-contato" placeholder="Nome">
                <label for="sobrenome-contato">Sobrenome</label>
                <input type="text" id="sobrenome-contato" name="sobrenome-contato" placeholder="Sobrenome">
                <label for="email-contato">Email *</label>
                <input type="email" id="email-contato" name="email-contato" placeholder="Email" required>
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" placeholder="Mensagem"></textarea>
                <button type="submit" class="btn-primary hover-effect">Enviar</button>
            </form>
        </div>
    </section>

    <!-- Rodapé -->
    <footer class="reveal">
        <div class="footer-content">
            <div class="footer-left">
                <p>BIGFOOT Esports</p>
                <p>bigftesports@gmail.com</p>
                <p>Brasil</p>
            </div>
            <div class="footer-right">
                <a href="#" class="social-icon hover-effect"><img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/dc.svg" alt="Discord"></a>
                <a href="#" class="social-icon hover-effect"><img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/x.svg" alt="X"></a>
                <a href="#" class="social-icon hover-effect"><img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/yt.svg" alt="YouTube"></a>
                <a href="#" class="social-icon hover-effect"><img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/tw.svg" alt="Twitch"></a>
                <a href="#" class="social-icon hover-effect"><img src="https://raw.githubusercontent.com/fabricioricard/BIGFOOT-Esports-Site/main/images/fb.svg" alt="Facebook"></a>
            </div>
        </div>
    </footer>

    <!-- Botão Voltar ao Topo -->
    <button id="back-to-top" class="back-to-top">⬆</button>

    <script src="script.js"></script>
</body>
</html>
