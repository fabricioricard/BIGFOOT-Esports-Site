<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIGFOOT Esports</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <div class="logo">BIGFOOT Esports</div>
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="eventos.html">Eventos</a></li>
                <li><a href="loja.html">Loja</a></li>
                <li><a href="equipe.html">Equipe</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="login-bar">
                <button id="login-btn">Login</button>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search">
                <button>🔍</button>
            </div>
        </nav>
    </header>

    <!-- Modal de Login -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close">×</span>
            <h2>Login</h2>
            <form id="login-form">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Usuário" required>
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Seção Inicial (Hero Section) -->
    <section id="home" class="hero-section">
        <div class="hero-content">
            <h1>Bem-vindo ao BIGFOOT Esports</h1>
            <p>Junte-se à nossa comunidade e faça parte da evolução do esporte eletrônico!</p>
        </div>
    </section>

    <!-- Rodapé -->
    <footer class="fade-in">
        <div class="footer-content">
            <div class="footer-left">
                <p>BIGFOOT Esports</p>
                <p>bigfootesports@gmail.com</p>
                <p>Brasil</p>
            </div>
            <div class="footer-right">
                <a href="#" class="hover-effect"><img src="https://via.placeholder.com/30" alt="YouTube"></a>
                <a href="#" class="hover-effect"><img src="https://via.placeholder.com/30" alt="X"></a>
                <a href="#" class="hover-effect"><img src="https://via.placeholder.com/30" alt="Facebook"></a>
                <a href="#" class="hover-effect"><img src="https://via.placeholder.com/30" alt="Twitch"></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
